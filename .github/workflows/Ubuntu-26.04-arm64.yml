name: CI ssh (Ubuntu 26.04 arm64)

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-26.04-arm
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            curl \
            wget \
            unzip \
            build-essential \
            llvm \
            clang \
            lld \
            busybox \
            cpio \
            flex \
            bison \
            bc \
            ccache \
            libselinux* \
            python3 \
            python-is-python3 \
            python3-pip \
            build-essential \
            make \
            cmake \
            automake \
            autoconf \
            m4 \
            pkg-config

      # Add your build/setup steps here
      - name: Test
        run: |
          pwd
          ls -la

      - name: SSH Debug (tmate)
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
